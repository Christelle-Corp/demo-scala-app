name: SBT Dependency Submission

on:
  push:
    branches:
      - main
  # Run weekly to catch new vulnerabilities even if code doesn't change
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at midnight
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  submit-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to submit dependencies
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Setup SBT
        run: |
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
          echo "deb https://repo.scala-sbt.org/scalasbt/debian /" | sudo tee -a /etc/apt/sources.list.d/sbt.list
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv 2EE0EA64E40A89B84B2DF73499E82A75642AC823
          sudo apt-get update
          sudo apt-get install -y sbt
      
      - name: Submit SBT Dependencies
        uses: scalacenter/sbt-dependency-submission@v2
        # Optional parameters (uncomment if needed):
        # with:
        #   modules-ignore: 'root scala-app-test'
        #   configs-ignore: 'scala-tool scala-doc-tool test-internal'
